name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest ruff build

      - name: Run tests
        run: python -m pytest

      - name: Run worker routing tests
        run: node --test tests/worker-routing.test.mjs

      - name: Run frontend format configuration tests
        run: node --test tests/frontend-format-config.test.mjs

      - name: Run recognition regression tests
        run: python -m pytest tests/test_recognition_decoder.py

      - name: Run ruff
        run: python -m ruff check src tests scripts

      - name: Verify package build
        run: python -m build
