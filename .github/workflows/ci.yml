name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docxtool/requirements.txt pytest ruff

      - name: Run tests
        run: python -m pytest

      - name: Run worker routing tests
        run: node --test tests/worker-routing.test.mjs

      - name: Run ruff
        run: python -m ruff check server.py importer.py style_config.py engine security tests scripts
